name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ncl-gate:
    # Nickel contract 통과 안 한 태그는 릴리스로 못 나감.
    # ncl-validate.yml 과 동일한 pxi 쪽 검증만 — control-plane 검증은 PR CI 에만 (PAT 필요).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nickel
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -L https://github.com/tweag/nickel/releases/latest/download/nickel-x86_64-linux \
            -o "$HOME/.local/bin/nickel"
          chmod +x "$HOME/.local/bin/nickel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Eval pxi ncl/*.ncl
        run: |
          set -e
          fail=0
          for f in ncl/*.ncl; do
            echo "→ nickel eval $f"
            if ! nickel eval "$f" > /dev/null; then
              echo "::error file=$f::Nickel eval 실패 — 태그 릴리스 차단"
              fail=1
            fi
          done
          for f in crates/domains/*/domain.ncl; do
            echo "→ nickel eval $f"
            if ! nickel eval "$f" > /dev/null; then
              echo "::error file=$f::Nickel eval 실패 — 태그 릴리스 차단"
              fail=1
            fi
          done
          exit $fail

  build:
    needs: ncl-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
        binary:
          - pxi-code-server
          - pxi-wordpress
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.binary }}
        run: cargo build --release -p ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Smoke test
        run: bash tests/smoke.sh target/${{ matrix.target }}/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*"
          generate_release_notes: true
