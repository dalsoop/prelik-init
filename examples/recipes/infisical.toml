[service]
name = "infisical"
description = "Infisical — 오픈소스 시크릿 관리 (Docker Compose)"

[lxc]
cores = "2"
memory = "2048"
disk = "10"

[install]
packages = ["docker.io", "docker-compose-v2", "curl", "openssl"]

[[install.steps]]
name = "Docker daemon enable"
run = "systemctl enable --now docker"

[[install.steps]]
name = "compose + .env 자동 생성"
run = """
mkdir -p /opt/infisical
cd /opt/infisical

# 공식 self-host docker-compose (v2 최신)
[ -f docker-compose.yml ] || curl -fsSL \
  https://raw.githubusercontent.com/Infisical/infisical/main/docker-compose.prod.yml \
  -o docker-compose.yml

# .env 기본값 (시크릿 자동 생성)
if [ ! -f .env ]; then
  ENCRYPTION_KEY=$(openssl rand -hex 16)
  AUTH_SECRET=$(openssl rand -base64 32)
  JWT_SIGNUP_SECRET=$(openssl rand -hex 32)
  JWT_REFRESH_SECRET=$(openssl rand -hex 32)
  JWT_AUTH_SECRET=$(openssl rand -hex 32)
  JWT_MFA_SECRET=$(openssl rand -hex 32)
  JWT_SERVICE_SECRET=$(openssl rand -hex 32)
  JWT_PROVIDER_AUTH_SECRET=$(openssl rand -hex 32)
  PORT="${INFISICAL_PORT:-8080}"

  cat > .env << ENV
ENCRYPTION_KEY=${ENCRYPTION_KEY}
AUTH_SECRET=${AUTH_SECRET}
JWT_SIGNUP_SECRET=${JWT_SIGNUP_SECRET}
JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
JWT_AUTH_SECRET=${JWT_AUTH_SECRET}
JWT_MFA_SECRET=${JWT_MFA_SECRET}
JWT_SERVICE_SECRET=${JWT_SERVICE_SECRET}
JWT_PROVIDER_AUTH_SECRET=${JWT_PROVIDER_AUTH_SECRET}
SITE_URL=${INFISICAL_SITE_URL:-http://localhost:${PORT}}
ENV
  chmod 600 .env
fi
"""

[[install.steps]]
name = "compose up -d"
run = "cd /opt/infisical && docker compose up -d"

[[install.steps]]
name = "검증 (포트 응답까지 60초)"
run = """
PORT="${INFISICAL_PORT:-8080}"
for i in $(seq 1 60); do
  curl -fsS http://localhost:${PORT}/ -o /dev/null && echo "✓ infisical 동작 (:${PORT})" && exit 0
  sleep 1
done
echo "✗ infisical 시작 실패 (60초 타임아웃) — docker compose logs로 확인" >&2
exit 1
"""
